# Reusable workflow that downloads/caches `defoldsdk.zip` and `bob.jar`.
# Usage (from another workflow):
# jobs:
#   setup-defoldsdk:
#     uses: defold/github-actions-common/.github/workflows/defoldsdk.yml@<ref>
#     with:
#       runner: ubuntu-latest
#       defold_channel: stable   # stable|alpha|beta
#       defold_version: latest   # or explicit tag, e.g. 1.9.8
#       sdk_output_path: build/defoldsdk
#       bob_output_path: bob.jar
# Outputs:
# - `defold_version`: resolved Defold release tag
# - `defoldsdk_cache_key`: cache key including release asset ETags
# - `dynamo_home`: absolute path to extracted `defoldsdk` folder
# - `bob_path`: absolute path to `bob.jar`
# Caller example:
#   needs.setup-defoldsdk.outputs.dynamo_home
#   needs.setup-defoldsdk.outputs.bob_path

name: Defold SDK Setup

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      defold_channel:
        required: false
        type: string
        default: stable
      defold_version:
        required: false
        type: string
        default: "latest"
      sdk_output_path:
        required: false
        type: string
        default: "build/defoldsdk"
      bob_output_path:
        required: false
        type: string
        default: "bob.jar"
    outputs:
      defold_version:
        description: "Resolved Defold version tag used for download/cache."
        value: ${{ jobs.prepare.outputs.defold_version }}
      defoldsdk_cache_key:
        description: "Resolved cache key including release asset ETags."
        value: ${{ jobs.prepare.outputs.defoldsdk_cache_key }}
      dynamo_home:
        description: "Absolute path to the extracted defoldsdk directory."
        value: ${{ jobs.prepare.outputs.dynamo_home }}
      bob_path:
        description: "Absolute path to the resolved bob.jar."
        value: ${{ jobs.prepare.outputs.bob_path }}

jobs:
  prepare:
    runs-on: ${{ inputs.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      defold_version: ${{ steps.resolve-version.outputs.defold_version }}
      defoldsdk_cache_key: ${{ steps.compute-cache-key.outputs.cache_key }}
      dynamo_home: ${{ steps.resolve-paths.outputs.dynamo_home }}
      bob_path: ${{ steps.resolve-paths.outputs.bob_path }}
    steps:
      # Resolve the Defold release tag from channel/version inputs.
      # - stable + latest => GitHub /releases/latest
      # - alpha/beta + latest => highest semantic tag ending with -alpha/-beta
      # - explicit version => use as-is
      - name: Resolve Defold version
        id: resolve-version
        shell: bash
        run: |
          set -euo pipefail
          CHANNEL="${{ inputs.defold_channel }}"
          VERSION="${{ inputs.defold_version }}"
          if [ "$VERSION" == "latest" ]; then
            if [ "$CHANNEL" == "stable" ]; then
              VERSION=$(gh release list --repo defold/defold --json isLatest,name,tagName -q 'map(select(.isLatest == true))[0].tagName')
            else
              if [ "$CHANNEL" == "beta" ] || [ "$CHANNEL" == "alpha" ]; then
                VERSION=$(gh release list --repo defold/defold --order "desc" --json isLatest,name,tagName -q "map(select(.tagName | endswith(\"-$CHANNEL\")))[0].tagName")
              else
                echo "Unsupported channel/version combination: channel=$CHANNEL, version=$VERSION"
                exit 1
              fi
            fi
          fi
          echo "defold_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using Defold version: ${VERSION}"

      # Fetch ETags for defoldsdk.zip and bob.jar to detect changed assets.
      # This avoids stale cache hits when release assets are replaced in-place.
      - name: Resolve release asset ETags
        id: resolve-etags
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-version.outputs.defold_version }}"
          BASE_URL="https://github.com/defold/defold/releases/download/${VERSION}"
          SDK_URL="${BASE_URL}/defoldsdk.zip"
          BOB_URL="${BASE_URL}/bob.jar"

          get_etag() {
            local url="$1"
            local etag
            etag="$(curl -fsSIL "${url}" | tr -d '\r' | awk 'tolower($1) == "etag:" { print $2 }' | tail -n 1 || true)"
            if [ -z "${etag}" ]; then
              etag="missing"
            fi
            etag="${etag#W/}"
            etag="${etag%\"}"
            etag="${etag#\"}"
            etag="$(printf '%s' "${etag}" | tr -cs '[:alnum:]_.:-' '-')"
            printf '%s' "${etag}"
          }

          SDK_ETAG="$(get_etag "${SDK_URL}")"
          BOB_ETAG="$(get_etag "${BOB_URL}")"

          ETAG_FINGERPRINT="$(echo -n "${SDK_ETAG}|${BOB_ETAG}" | sha256sum | cut -c1-16)"

          {
            echo "sdk_etag=${SDK_ETAG}"
            echo "bob_etag=${BOB_ETAG}"
            echo "etag_fingerprint=${ETAG_FINGERPRINT}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ETags: defoldsdk.zip=${SDK_ETAG}, bob.jar=${BOB_ETAG}"

      # Build a cache key from the resolved version and ETag fingerprint.
      - name: Compute Defold SDK cache key
        id: compute-cache-key
        shell: bash
        run: |
          set -euo pipefail
          CACHE_KEY="defoldsdk-${{ steps.resolve-version.outputs.defold_version }}-${{ steps.resolve-etags.outputs.etag_fingerprint }}"
          echo "cache_key=${CACHE_KEY}" >> "$GITHUB_OUTPUT"
          echo "Using cache key: ${CACHE_KEY}"

      # Restore/save both SDK directory and bob.jar from/to Actions cache.
      - name: Cache Defold SDK and bob.jar
        id: cache-defoldsdk
        uses: actions/cache@v5
        with:
          path: |
            ${{ inputs.bob_output_path }}
            ${{ inputs.sdk_output_path }}
          key: ${{ steps.compute-cache-key.outputs.cache_key }}
          enableCrossOsArchive: true

      # Download and unpack defoldsdk.zip only when cache miss occurs.
      - name: Download and extract Defold SDK
        if: steps.cache-defoldsdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-version.outputs.defold_version }}"
          BASE_URL="https://github.com/defold/defold/releases/download/${VERSION}"
          SDK_URL="${BASE_URL}/defoldsdk.zip"
          SDK_ROOT="${{ inputs.sdk_output_path }}"
          SDK_ZIP="${SDK_ROOT%/}.zip"

          mkdir -p "$(dirname "${SDK_ROOT}")"
          rm -rf "${SDK_ROOT}"
          rm -f "${SDK_ZIP}"

          echo "Downloading ${SDK_URL}"
          curl -fSL -o "${SDK_ZIP}" "${SDK_URL}"

          mkdir -p "${SDK_ROOT}"
          if command -v unzip >/dev/null 2>&1; then
            unzip -q "${SDK_ZIP}" -d "${SDK_ROOT}"
          else
            tar -xf "${SDK_ZIP}" -C "${SDK_ROOT}"
          fi
          rm -f "${SDK_ZIP}"

          if [ ! -d "${SDK_ROOT}/defoldsdk" ]; then
            echo "Expected SDK folder missing: ${SDK_ROOT}/defoldsdk" >&2
            exit 1
          fi

      # Download bob.jar only when cache miss occurs.
      - name: Download bob.jar
        if: steps.cache-defoldsdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.resolve-version.outputs.defold_version }}"
          BASE_URL="https://github.com/defold/defold/releases/download/${VERSION}"
          BOB_URL="${BASE_URL}/bob.jar"
          BOB_PATH="${{ inputs.bob_output_path }}"
          mkdir -p "$(dirname "${BOB_PATH}")"
          rm -f "${BOB_PATH}"
          echo "Downloading ${BOB_URL}"
          curl -fSL -o "${BOB_PATH}" "${BOB_URL}"

      # Validate artifacts and expose absolute paths as reusable-workflow outputs.
      - name: Resolve SDK output paths
        id: resolve-paths
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${{ inputs.sdk_output_path }}"
          BOB_PATH="${{ inputs.bob_output_path }}"
          if [ ! -d "${SDK_ROOT}/defoldsdk" ]; then
            echo "Expected SDK folder missing: ${SDK_ROOT}/defoldsdk" >&2
            exit 1
          fi
          if [ ! -f "${BOB_PATH}" ]; then
            echo "Expected bob.jar missing: ${BOB_PATH}" >&2
            exit 1
          fi
          DYNAMO_HOME="$(realpath "${SDK_ROOT}/defoldsdk")"
          BOB_PATH_REAL="$(realpath "${BOB_PATH}")"
          {
            echo "dynamo_home=${DYNAMO_HOME}"
            echo "bob_path=${BOB_PATH_REAL}"
          } >> "$GITHUB_OUTPUT"
