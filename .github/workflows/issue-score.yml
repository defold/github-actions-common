name: Update issue score

on: [workflow_call]

permissions:
  contents: read
  issues: write

jobs:
  update-score:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
    steps:
      - name: Update Score field
        uses: actions/github-script@v8
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const issueNumber = context.payload.issue?.number ?? Number(context.payload.inputs.issue_number);
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const toNumber = function(value, fieldName) {
              const number = Number(value);
              if (!Number.isFinite(number)) {
                throw new Error(`${fieldName} must be numeric, got: ${value}`);
              }
              return number;
            };

            const fieldName = function(node) {
              return node.field?.name;
            };
            const fieldValue = function(node) {
              if ("value" in node) { return node.value };
              if ("name" in node) { return node.name };
              return undefined;
            };

            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issueFields(first: 100) {
                    nodes {
                      ... on IssueFieldNumber {
                        id
                        name
                        dataType
                      }
                      ... on IssueFieldText {
                        id
                        name
                        dataType
                      }
                      ... on IssueFieldSingleSelect {
                        id
                        name
                        dataType
                      }
                    }
                  }
                  issue(number: $issueNumber) {
                    id
                    issueFieldValues(first: 100) {
                      nodes {
                        ... on IssueFieldNumberValue {
                          value
                          field {
                            ... on IssueFieldCommon {
                              name
                            }
                          }
                        }
                        ... on IssueFieldTextValue {
                          value
                          field {
                            ... on IssueFieldCommon {
                              name
                            }
                          }
                        }
                        ... on IssueFieldSingleSelectValue {
                          value
                          field {
                            ... on IssueFieldCommon {
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
