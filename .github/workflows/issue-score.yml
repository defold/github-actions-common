name: Update issue score

on: [workflow_call]

permissions:
  contents: read
  issues: write

jobs:
  update-score:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN || github.token }}
    steps:
      - name: Update Score field
        uses: actions/github-script@v8
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const issueNumber = context.payload.issue?.number ?? Number(context.payload.inputs.issue_number);
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const toNumber = function(value, fieldName) {
              const number = Number(value);
              if (!Number.isFinite(number)) {
                throw new Error(`${fieldName} must be numeric, got: ${value}`);
              }
              return number;
            };
